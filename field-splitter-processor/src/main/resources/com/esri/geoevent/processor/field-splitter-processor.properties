# Default property values for Field Splitter Processor
default.fieldToSplit=${fieldsplitter.default.fieldToSplit}
default.fieldSplitter=${fieldsplitter.default.fieldSplitter}

# Processor Properties
PROCESSOR_NAME=${project.name}
PROCESSOR_DOMAIN=${project.groupId}
PROCESSOR_VERSION=${project.version}
PROCESSOR_CONTACT=${contact.address}
PROCESSOR_LABEL=Field Splitter
PROCESSOR_DESC=<p>The Field Splitter Processor splits a configured string field into multiple GeoEvents, one output event per split value.</p><p>The <b>Delimiter</b> setting is passed directly to Java <code>String.split()</code>, which uses regular expressions. Use escaped patterns for regex metacharacters (for example, <code>\\.</code> for a literal dot and <code>\\|</code> for a literal pipe).</p><p>Set <b>Field to Split</b> to the input field name (or tagged field) that contains the delimited string to process.</p>

# Field Splitter Properties
FIELD_TO_SPLIT_LABEL=Field to Split
FIELD_TO_SPLIT_DESC=Name of the field whose value will be split into individual GeoEvents
FIELD_SPLITTER_LABEL=Delimiter
FIELD_SPLITTER_DESC=<p>Delimiter pattern passed directly to Java <code>String.split()</code>.</p><p>This value is a regular expression, not a plain literal string. Escape regex metacharacters when you want literal matches (for example, use <code>\\.</code> to split on a period).</p>

