# Default property values for Field Splitter Processor
default.fieldToSplit=${fieldsplitter.default.fieldToSplit}
default.fieldSplitter=${fieldsplitter.default.fieldSplitter}

# Processor Properties
PROCESSOR_NAME=${project.name}
PROCESSOR_DOMAIN=${project.groupId}
PROCESSOR_VERSION=${project.version}
PROCESSOR_CONTACT=${contact.address}
PROCESSOR_LABEL=Field Splitter
PROCESSOR_DESC=Release ${project.version}: Split a string field with delimited values into individual GeoEvents

# Field Splitter Properties
FIELD_TO_SPLIT_LABEL=Field to Split
FIELD_TO_SPLIT_DESC=Name of the field whose value will be split into individual GeoEvents
FIELD_SPLITTER_LABEL=Delimiter
FIELD_SPLITTER_DESC=Character or String used to split the field value into individual GeoEvents

# Log Messages
PROPERTY_DEFINITION_ERROR=Error creating property definition.
RESOURCE_NOT_FOUND=Defaults resource "{0}" was not found. Built-in defaults will be used.
RESOURCE_LOAD_FAILED=Unable to load defaults resource "{0}". Built-in defaults will be used.
PROCESSOR_INSTANTIATED=Field Splitter instantiated.
SERVICE_INSTANTIATED=FieldSplitterService instantiated.
SPLIT_FAILED=Failed to split GeoEvent: {0}
SPLIT_FAILED_FIELD=Failed to split field "{0}" in GeoEvent: {1}
VALIDATION_FAILED={0} validation failed: {1}
